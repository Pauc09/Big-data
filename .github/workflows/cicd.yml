name: CI/CD Chinook

on:
  push:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Instalar dependencias backend
        run: |
          cd backend
          pip install fastapi uvicorn sqlalchemy aiomysql pydantic-settings pytest pytest-asyncio httpx pytest-cov

      - name: Correr pruebas backend
        run: |
          cd backend
          pytest tests/ -v --cov=app --cov-report=term-missing

  deploy:
    runs-on: ubuntu-latest
    needs: test-backend
    if: success()
    steps:
      - name: Desplegar backend al EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/environment/fastapi-rds
            git -C /home/ubuntu/environment pull origin main
            source /home/ubuntu/environment/venv/bin/activate
            pkill -f uvicorn || true
            nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 > /tmp/backend.log 2>&1 &

      - name: Desplegar frontend al EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/environment/chinook-frontend
            git -C /home/ubuntu/environment pull origin main
            npm install
            pkill -f "vite" || true
            nohup npm run dev -- --host > /tmp/frontend.log 2>&1 &
